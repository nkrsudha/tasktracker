<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }
    body 
    {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
    }

    .table-wrapper 
    {
      width: 100%;
      overflow-x: auto;
      margin-top: 20px;
    }
    /* HEADER BAR */
    header 
    {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #222;
      color: white;
      gap: 15px;
      flex-wrap: wrap;
    }

    header h1 
    {
      margin: 0;
      font-size: 26px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-icons i 
    {
      font-size: 28px;
      cursor: pointer;
    
    }

    .nav-icons i:hover 
    {
      color: #4CAF50;
    }

    /* Main Content */
    section 
    {
      padding: 30px;
    }

    h2 
    {
      text-align: center;
    }

   #userForm, #taskForm 
   {
      margin: 0 auto 20px auto;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-items: center;
    }

    input, button, select 
    {
      padding: 10px;
      font-size: 14px;
    }

    #userForm input,
    #taskForm input,
    #taskForm select,
    #userForm button,
    #taskForm button
    {
      width: 100%;
      min-height: 0;  
      height: 42px;
    }

    button 
    {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    table
     {
      width: 100%;
      min-width: 950px;
      margin: 0;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    #userTable 
    {
      min-width: 600px;
    }

    #taskTable th:nth-child(1),
    #taskTable td:nth-child(1) 
    {
      min-width: 60px;
    }

    #taskTable th:nth-child(2),
    #taskTable td:nth-child(2) 
    {
      min-width: 140px;
    }

    #taskTable th:nth-child(3),
    #taskTable td:nth-child(3) 
    {
      min-width: 260px;
    }

    #taskTable th:nth-child(4),
    #taskTable td:nth-child(4)
    {
      min-width: 150px;
    }

    #taskTable th:nth-child(5),
    #taskTable td:nth-child(5) 
    {
      min-width: 140px;
    }

    #taskTable th:nth-child(6),
    #taskTable td:nth-child(6)
    {
      min-width: 180px;
    }

    #taskTable th:nth-child(7),
    #taskTable td:nth-child(7) 
    {
      min-width: 120px;
    }

    th, td 
    {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
      vertical-align: middle;
    }

    th
    {
      background-color: #f2f2f2;
      white-space: nowrap;
    }
    /* Popup Modal */
    .modal-overlay 
    {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
    }
    .modal-box 
    {
      background: white;
      width: 80%;
      max-width: 700px;
      margin: 80px auto;
      padding: 20px;
      border-radius: 8px;
      position: relative;
    }
    .modal-close 
    {
      position: absolute;
      top: 10px;
      right: 12px;
      border: none;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
    }
    .modal-table 
    {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .modal-table th, .modal-table td
    {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    .user-link 
    {
      color: #1a73e8;
      text-decoration: underline;
      cursor: pointer;
    }
    .nav-icons
    {
      display: flex;
      align-items: center;
      gap: 20px; 
      flex-wrap: wrap;         
    }

    .nav-icons i
    {
      margin-left: 0;     
    }

    .logout-btn
    {
      background: transparent;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      padding: 0;
    }

    .logout-btn:hover
    {
      color: #4CAF50;
    }

    @media (max-width: 768px) 
    {
      section 
      {
        padding: 20px 12px;
      }

  #userForm,#taskForm 
  {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  #userForm input,
  #taskForm input,
  #taskForm select,
  #userForm button,
  #taskForm button 
  {
    width: 100%;
    height: 42px;
  }

  th,td 
  {
    font-size: 13px;
    padding: 8px;
  }

  header 
  {
    padding: 15px 20px;
  }

  header h1 
  {
    font-size: 22px;
  }

  .nav-icons i,
  .logout-btn 
  {
    font-size: 22px;
  }
}
  </style>
</head>
<body>

<!-- TOP NAVIGATION -->
<header>
  <h1>📋 Task Tracker</h1>

  <div class="nav-icons">
    <i id="usersBtn" class="fa fa-users" onclick="showSection('userSection')" title="Users"></i>
    <i class="fa fa-tasks" onclick="showSection('taskSection')" title="Tasks"></i>
  
    <form action="/logout" method="post" style="margin:0;">
      <button type="submit" class="logout-btn" title="Logout">
        <i class="fa fa-right-from-bracket"></i>
      </button>
    </form>
  </div>
</header>
<div id="alertContainer"
     class="position-fixed top-0 start-50 translate-middle-x p-3"
     style="z-index: 1055;">
</div>


<!-- USER SECTION -->
<section id="userSection" style="display:none;">
  <h2>User Registration</h2>

  <form id="userForm">
    <input type="text" id="username" placeholder="Username" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Register</button>
  </form>

  <div class="table-wrapper">
  <table id="userTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  </div>
</section>

<!-- TASK SECTION -->
<section id="taskSection">
  <h2>Tasks</h2>

  <form id="taskForm">
    <input type="text" id="title" placeholder="Task Title" required />
    <input type="text" id="description" placeholder="Task Description" required />
    <select id="taskUser" required>
      <option value="">Assign to User</option>
    </select>
    <button id="addTaskBtn" type="submit">Add Task</button>
  </form>

  <div class="table-wrapper">
  <table id="taskTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Assigned User</th>
        <th>Status</th>
        <th>Created At</th>
        <th id="deleteHeader">Delete</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Popup: User Tasks -->
<div id="userTasksModal" class="modal-overlay">
  <div class="modal-box">
    <button id="closeUserTasksModal" class="modal-close">✖</button>
    <h3 id="userTasksTitle">User Tasks</h3>

    <div id="userTasksMsg">Loading...</div>

    <table id="userTasksTable" class="modal-table" style="display:none;">
      <thead>
        <tr>
          <th>Task Name</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="userTasksBody"></tbody>
    </table>
  </div>
</div>
<!-- Delete Confirmation Modal -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete this task?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
